<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark rounded-square background — brand --bg-elevated (#181824) -->
  <rect width="512" height="512" rx="112" fill="#181824"/>
  <!-- Subtle gold glow behind the coin -->
  <rect width="512" height="512" rx="112" fill="url(#goldGlow)"/>

  <!-- Gold coin — brand --gold (#f7c948) with a darker rim (--gold-dim) -->
  <circle cx="256" cy="256" r="158" fill="#f7c948" stroke="#d4a530" stroke-width="14"/>

  <!-- Bitcoin ₿ in the dark brand background colour -->
  <path d="M-40 -60
           h80
           a40 40 0 0 1 0 80
           h-80
           h80
           a40 40 0 0 1 0 80
           h-80
           M0 -80 v180
           M40 -80 v180"
        transform="translate(256 256)"
        stroke="#08080d"
        stroke-width="24"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>

  <defs>
    <radialGradient id="goldGlow" cx="0.5" cy="0.42" r="0.62">
      <stop offset="0" stop-color="#f7c948" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#f7c948" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
