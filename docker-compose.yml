services:
  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    volumes:
      - server-data:/app/data
    environment:
      - ARK_SERVER_URL=http://arkd:7070
      - ESPLORA_URL=http://mempool_web/api
      - PUBLIC_PORT=3001
      - ADMIN_PORT=3002
      # Bind admin listener inside the container to all interfaces so
      # the docker port mapping below can reach it. ADMIN_HOST defaults
      # to 127.0.0.1 in src/index.ts for production-style isolation;
      # the docker-compose port map is the right access boundary here.
      - ADMIN_HOST=0.0.0.0
      - DATA_DIR=/app/data
    ports:
      - "3002:3002"
    networks:
      - arkade-regtest
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    environment:
      - API_HOST=server
      - API_PORT=3001
    depends_on:
      - server
    networks:
      - arkade-regtest
    restart: unless-stopped

networks:
  arkade-regtest:
    # The arkade-regtest Node CLI (`node arkade-regtest/regtest.mjs start`) brings
    # up its Docker Compose project under the name "arkade-regtest", which creates
    # the default network "arkade-regtest_default". Join it so this server can reach
    # arkd / mempool_web by service name.
    external: true
    name: arkade-regtest_default

volumes:
  server-data:
