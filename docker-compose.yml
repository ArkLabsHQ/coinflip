services:
  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    volumes:
      - server-data:/app/data
    environment:
      - ARK_SERVER_URL=http://ark:7070
      - ESPLORA_URL=http://chopsticks:3000
      - PUBLIC_PORT=3001
      - ADMIN_PORT=3002
      - DATA_DIR=/app/data
    ports:
      - "3002:3002"
    networks:
      - nigiri
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    environment:
      - API_HOST=server
      - API_PORT=3001
    depends_on:
      - server
    networks:
      - nigiri
    restart: unless-stopped

networks:
  nigiri:
    external: true

volumes:
  server-data:
